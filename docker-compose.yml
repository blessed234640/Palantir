services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: palantir-postgres
    environment:
      POSTGRES_USER: palantir
      POSTGRES_PASSWORD: palantir
      POSTGRES_DB: palantir
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: palantir-redis
    ports:
      - "6379:6379"

volumes:
  pgdata: